apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      component: mysql
      project: roboshop
      tier: db
  template:
    metadata:
      labels:
        component: mysql
        project: roboshop
        tier: db
    spec:
      containers:
        - name: mysql
          image: prudhviteja9692/mysql:1.2.0
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    component: mysql
    project: roboshop
    tier: db
spec:
  selector:
    component: mysql
    project: roboshop
    tier: db
  ports:
    - protocol: TCP
      port: 3306 # service port
      targetPort: 3306 # container port

